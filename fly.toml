# fly.toml app configuration file generated for mytrip on 2025-12-10T10:02:33+01:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mytrip-app' # You may need to change this if the name is taken
primary_region = 'ams' # Amsterdam, close to central Europe

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '3001'
  # NODE_ENV = 'production' # Uncomment to enforce production mode if your app supports it

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpus = 1
  cpu_kind = 'shared'
